name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the image using docker/Dockerfile. The builder stage runs
      # `mvn clean install`, so this also compiles and runs the test suite.
      - name: Build image (compiles + runs tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max