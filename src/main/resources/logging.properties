
# Root logger level
.level = INFO

handlers = java.util.logging.ConsoleHandler

# Root logger level
# Console handler (stdout/stderr depending on level)
java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Formatting
java.util.logging.SimpleFormatter.format=[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS][%4$-7s][%3$-25s] %5$s%6$s%n

# Application-specific logger levels
no.uib.marcus.level = INFO

# Third-party library log levels (optional - to reduce noise)
org.apache.level = INFO
co.elastic.level = INFO
com.fasterxml.level = INFO

