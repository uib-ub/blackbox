# Root logger level (equivalent to log4j.rootLogger=DEBUG)
.level = FINE

# Define handlers (equivalent to log4j appenders)
handlers = java.util.logging.FileHandler, java.util.logging.ConsoleHandler

# Console handler configuration (equivalent to stdout appender)
java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS][%4$-7s][%3$-25s] %5$s%6$s%n

# File handler configuration (equivalent to RollingAppender)
java.util.logging.FileHandler.level = ALL
java.util.logging.FileHandler.pattern = /var/log/blackbox/blackbox.%g.log
java.util.logging.FileHandler.limit = 10485760
java.util.logging.FileHandler.count = 10
java.util.logging.FileHandler.append = true
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

# Application-specific logger levels
no.uib.marcus.level = FINE

# Third-party library log levels (optional - to reduce noise)
org.apache.level = INFO
co.elastic.level = INFO
com.fasterxml.level = INFO
